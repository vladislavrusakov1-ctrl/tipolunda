<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Padel Tournament</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #111;
      padding: 14px;
    }

    .container {
      max-width: 520px;
      margin: 0 auto;
      background: #fff;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    h1, h2 {
      margin-top: 0;
    }

    h1 {
      font-size: 24px;
      text-align: center;
      margin-bottom: 20px;
    }

    h2 {
      font-size: 18px;
      margin: 20px 0 12px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    input, select, button {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 12px;
      font-size: 16px;
      margin-bottom: 12px;
    }

    button {
      background: #111;
      color: white;
      border: none;
      font-weight: 700;
      cursor: pointer;
    }

    .hidden { display: none; }

    .match {
      border: 1px solid #eee;
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 14px;
      background: #fafafa;
    }

    .team {
      font-weight: 700;
      margin-bottom: 8px;
    }

    .score-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .score-row input {
      margin: 0;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      padding: 10px 6px;
      border-bottom: 1px solid #eee;
      text-align: left;
      font-size: 14px;
    }

    .positive {
      color: green;
      font-weight: 700;
    }

    .negative {
      color: red;
      font-weight: 700;
    }

    .neutral {
      font-weight: 700;
    }
  </style>
</head>
<body>
<div class="container">

  <div id="setupScreen">
    <h1>Padel Tournament</h1>

    <h2>Настройка турнира</h2>

    <label>Количество участников</label>
    <select id="playersCount" onchange="renderPlayerInputs()">
      <option value="4">4</option>
      <option value="8">8</option>
      <option value="9">9</option>
      <option value="12">12</option>
      <option value="16">16</option>
    </select>

    <label>Игра до (сумма очков)</label>
    <input type="number" id="maxPoints" value="19" min="1" />

    <div id="playersInputs"></div>

    <button onclick="startTournament()">Начать турнир</button>
  </div>

  <div id="tournamentScreen" class="hidden">
    <h1>Турнир</h1>

    <h2 id="roundTitle">Раунд 1</h2>
    <div id="matchArea"></div>

    <button onclick="nextRound()">Следующий раунд</button>

    <h2>Итоговая таблица</h2>
    <table>
      <thead>
        <tr>
          <th>Игрок</th>
          <th>Очки</th>
        </tr>
      </thead>
      <tbody id="resultsTable"></tbody>
    </table>
  </div>

</div>

<script>
let players = [];
let scores = {};
let schedule = [];
let currentRound = 0;
let maxPoints = 19;

function renderPlayerInputs() {
  const count = parseInt(document.getElementById('playersCount').value);
  const box = document.getElementById('playersInputs');
  box.innerHTML = '<h2>Имена участников</h2>';

  for (let i = 1; i <= count; i++) {
    box.innerHTML += `
      <label>Игрок ${i}</label>
      <input type="text" id="player${i}" value="Игрок ${i}" />
    `;
  }
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function generateSchedule(list) {
  let rounds = [];
  let copy = [...list];

  for (let r = 0; r < 20; r++) {
    shuffle(copy);
    let matches = [];

    for (let i = 0; i < copy.length; i += 4) {
      if (copy[i+3]) {
        matches.push([
          [copy[i], copy[i+1]],
          [copy[i+2], copy[i+3]]
        ]);
      }
    }

    rounds.push(matches);
  }

  return rounds;
}

function startTournament() {
  const count = parseInt(document.getElementById('playersCount').value);
  maxPoints = parseInt(document.getElementById('maxPoints').value);

  players = [];
  scores = {};

  for (let i = 1; i <= count; i++) {
    const name = document.getElementById(`player${i}`).value.trim() || `Игрок ${i}`;
    players.push(name);
    scores[name] = 0;
  }

  schedule = generateSchedule(players);
  currentRound = 0;

  document.getElementById('setupScreen').classList.add('hidden');
  document.getElementById('tournamentScreen').classList.remove('hidden');

  renderRound();
  renderResults();
}

function renderRound() {
  const round = schedule[currentRound];
  const area = document.getElementById('matchArea');
  document.getElementById('roundTitle').textContent = `Раунд ${currentRound + 1}`;

  area.innerHTML = '';

  round.forEach((match, index) => {
    const team1 = `${match[0][0]} / ${match[0][1]}`;
    const team2 = `${match[1][0]} / ${match[1][1]}`;

    area.innerHTML += `
      <div class="match">
        <div class="team">Пара 1: ${team1}</div>
        <div class="team">Пара 2: ${team2}</div>

        <div class="score-row">
          <input type="number" min="0" max="${maxPoints}" id="a_${index}" value="0" oninput="syncScores(${index}, 'a')" />
          <input type="number" min="0" max="${maxPoints}" id="b_${index}" value="${maxPoints}" oninput="syncScores(${index}, 'b')" />
        </div>
      </div>
    `;
  });
}

function syncScores(index, source) {
  const a = document.getElementById(`a_${index}`);
  const b = document.getElementById(`b_${index}`);

  let val = parseInt(source === 'a' ? a.value : b.value) || 0;
  if (val > maxPoints) val = maxPoints;

  if (source === 'a') {
    a.value = val;
    b.value = Math.max(0, maxPoints - val);
  } else {
    b.value = val;
    a.value = Math.max(0, maxPoints - val);
  }
}

function nextRound() {
  const round = schedule[currentRound];

  round.forEach((match, index) => {
    const scoreA = parseInt(document.getElementById(`a_${index}`).value) || 0;
    const scoreB = parseInt(document.getElementById(`b_${index}`).value) || 0;

    if (scoreA > scoreB) {
      match[0].forEach(player => scores[player] += 1);
      match[1].forEach(player => scores[player] -= 1);
    } else if (scoreB > scoreA) {
      match[1].forEach(player => scores[player] += 1);
      match[0].forEach(player => scores[player] -= 1);
    }
  });

  currentRound++;

  if (currentRound >= schedule.length) {
    schedule.push(...generateSchedule(players));
  }

  renderResults();
  renderRound();
}

function renderResults() {
  const table = document.getElementById('resultsTable');
  table.innerHTML = '';

  const sorted = Object.entries(scores)
    .sort((a, b) => b[1] - a[1]);

  sorted.forEach(([name, score]) => {
    let cls = 'neutral';
    if (score > 0) cls = 'positive';
    if (score < 0) cls = 'negative';

    table.innerHTML += `
      <tr>
        <td>${name}</td>
        <td class="${cls}">${score > 0 ? '+' + score : score}</td>
      </tr>
    `;
  });
}

renderPlayerInputs();
</script>
</body>
</html>
